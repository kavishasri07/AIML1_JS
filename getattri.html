<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="myH1" class="democlass">The Element Object</h1>
    <p id="demo"></p>
    <button onmouseover="OnMouseOver">Button</button>

    <script>
        const element= document.getElementById("myH1");
        let text= element.getAttribute("democlass");
        document.getElementById("demo").innerHTML= text;

        const heading= document.createElement("h2");
        const bodytag= document.getElementsByTagName("body");
        bodytag[0].append(heading);
        heading.innerHTML= "hello"; heading.style.backgroundColor= "red";

        function onMouseOver() {
            console.log("ON Mouse Over");
        }

        const x= document.querySelector("input");
        x.addEventListener('focus', onhandlefocus);
        x.addEventListener('blur', onhandleblur);

        function onhandlefocus() {
            x.style.background= "red";
        }
        function onhandleblur() {
            x.style.background= "yellow";
            x.style.borderColor= "green";
        }
    </script>
</body>
</html>
